<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古琴减字谱数字化系统</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f5f0;
            margin: 0;
            padding: 20px;
            color: #3e2a1f;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #6b4c3b;
            border-bottom: 2px solid #e0c8b0;
            padding-bottom: 10px;
        }
        .auth-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .auth-bar button {
            background: #8b5a3c;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 15px;
            cursor: pointer;
        }
        .auth-bar .username {
            font-weight: bold;
        }
        .section {
            background: #fffaf5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #ede0d4;
        }
        .section h2 {
            margin-top: 0;
            color: #8b5a3c;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }
        input, select, textarea {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            width: 250px;
        }
        textarea {
            width: 300px;
            resize: vertical;
        }
        button {
            background-color: #8b5a3c;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        button:hover {
            background-color: #6b4c3b;
        }
        .upload-area {
            border: 2px dashed #c9b59a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #fff4e8;
        }
        .image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 220px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .image-card:hover {
            transform: translateY(-5px);
        }
        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #eee;
        }
        .image-card .info {
            padding: 10px;
        }
        .image-card h4 {
            margin: 0 0 5px;
            font-size: 1rem;
        }
        .image-card p {
            margin: 0;
            font-size: 0.8rem;
            color: #666;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        .char-card {
            background: #fff8f0;
            border-left: 6px solid #8b5a3c;
            border-radius: 12px;
            padding: 12px 16px;
            width: 260px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .char-card .char-code {
            font-size: 1.2rem;
            font-weight: bold;
            color: #8b5a3c;
        }
        .char-card .finger {
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
        }
        .char-card .confidence {
            font-size: 0.8rem;
            color: #2c7a4d;
        }
        .char-card .position {
            font-size: 0.75rem;
            color: #888;
        }
        .loading {
            text-align: center;
            color: #8b5a3c;
            font-style: italic;
        }
        .error {
            color: #c00;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 8px;
        }
        .auth-form {
            display: inline-block;
            background: #f0e8e0;
            padding: 10px 20px;
            border-radius: 30px;
        }
        .auth-form input {
            width: 120px;
            margin-right: 5px;
        }
        #adminSection {
            background: #f4f0ec;
            border: 1px solid #d4c8bc;
        }
        #adminSection h3 {
            margin-top: 0;
            color: #6b4c3b;
        }
        #addCharForm .form-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        #addCharForm label {
            width: 100px;
            margin-bottom: 0;
        }
        #addCharForm input, #addCharForm textarea {
            flex: 1;
            min-width: 200px;
        }
        #addCharResult {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 AI辅助古琴减字谱数字化与检索系统</h1>

    <!-- 认证栏 -->
    <div class="auth-bar" id="authBar">
        <div class="auth-form" id="loginForm">
            <input type="text" id="loginUsername" placeholder="用户名" size="10">
            <input type="password" id="loginPassword" placeholder="密码" size="10">
            <button id="doLoginBtn">登录</button>
            <button id="showRegisterBtn">注册</button>
        </div>
        <div id="userInfo" style="display:none;">
            <span class="username" id="currentUsername"></span>
            <button id="logoutBtn">登出</button>
        </div>
    </div>

    <!-- 注册面板 -->
    <div id="registerPanel" style="display:none; background:#f0e8e0; padding:15px; border-radius:16px; margin-bottom:20px;">
        <h3>注册新用户</h3>
        <input type="text" id="regUsername" placeholder="用户名">
        <input type="password" id="regPassword" placeholder="密码">
        <input type="email" id="regEmail" placeholder="邮箱（可选）">
        <button id="doRegisterBtn">注册</button>
        <button id="cancelRegisterBtn">取消</button>
        <div id="regMsg"></div>
    </div>

    <!-- 上传区域 -->
    <div class="section" id="uploadSection" style="display:none;">
        <h2>📤 上传减字谱图片</h2>
        <div class="upload-area">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>曲名：</label>
                    <input type="text" name="title" required placeholder="例：梅花三弄">
                </div>
                <div class="form-group">
                    <label>朝代：</label>
                    <input type="text" name="dynasty" placeholder="例：明">
                </div>
                <div class="form-group">
                    <label>作者：</label>
                    <input type="text" name="author" placeholder="例：朱权">
                </div>
                <div class="form-group">
                    <label>图片：</label>
                    <input type="file" name="file" accept="image/*" required>
                </div>
                <button type="submit">上传并识别</button>
            </form>
            <div id="uploadResult" style="margin-top: 15px;"></div>
        </div>
    </div>

    <!-- 检索区域 -->
    <div class="section" id="searchSection" style="display:none;">
        <h2>🔍 检索琴谱</h2>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <select id="searchType">
                <option value="title">按曲名</option>
                <option value="finger">按指法</option>
                <option value="dynasty">按朝代</option>
                <option value="author">按作者</option>
            </select>
            <input type="text" id="searchKeyword" placeholder="输入关键词" style="flex: 1; min-width: 200px;">
            <button id="searchBtn">检索</button>
        </div>
        <div id="searchResult" class="image-list"></div>
    </div>

    <!-- 管理减字符（仅管理员可见） -->
    <div class="section" id="adminSection" style="display:none;">
        <h2>📝 管理减字符</h2>
        <div style="background:#f0f0f0; padding:15px; border-radius:8px;">
            <h3>添加新减字符</h3>
            <form id="addCharForm">
                <div class="form-group">
                    <label>字符代码：</label>
                    <input type="text" id="char_code" required placeholder="例：中十挑七">
                </div>
                <div class="form-group">
                    <label>左手指法：</label>
                    <input type="text" id="left_finger" placeholder="例：中指">
                </div>
                <div class="form-group">
                    <label>徽位：</label>
                    <input type="text" id="left_position" placeholder="例：十徽">
                </div>
                <div class="form-group">
                    <label>右手指法：</label>
                    <input type="text" id="right_finger" placeholder="例：挑">
                </div>
                <div class="form-group">
                    <label>弦序：</label>
                    <input type="number" id="string_num" placeholder="例：7" min="1" max="7">
                </div>
                <div class="form-group">
                    <label>描述：</label>
                    <textarea id="description" rows="2" placeholder="左手...右手..." style="width:300px;"></textarea>
                </div>
                <button type="submit">添加</button>
            </form>
            <div id="addCharResult"></div>
        </div>
    </div>

    <!-- 识别结果展示 -->
    <div class="section" id="recogSection" style="display: none;">
        <h2>🎼 识别结果（卡片形式）</h2>
        <div id="recogCards" class="cards-container"></div>
        <button id="closeRecogBtn">关闭</button>
    </div>
</div>

<script>
    // 辅助函数：API 请求（自动携带凭证）
    async function apiCall(url, options = {}) {
        const fetchOptions = {
            ...options,
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                ...options.headers
            }
        };
        if (options.body && !(options.body instanceof FormData)) {
            fetchOptions.body = JSON.stringify(options.body);
        } else if (options.body instanceof FormData) {
            delete fetchOptions.headers['Content-Type'];
        }
        try {
            const response = await fetch(url, fetchOptions);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
            return data;
        } catch (err) {
            console.error(err);
            throw err;
        }
    }

    // UI 元素
    const loginFormDiv = document.getElementById('loginForm');
    const userInfoDiv = document.getElementById('userInfo');
    const currentUsernameSpan = document.getElementById('currentUsername');
    const uploadSection = document.getElementById('uploadSection');
    const searchSection = document.getElementById('searchSection');
    const registerPanel = document.getElementById('registerPanel');
    const regMsg = document.getElementById('regMsg');
    const adminSection = document.getElementById('adminSection');

    // 检查登录状态
    async function checkLogin() {
        try {
            const user = await apiCall('/api/current_user');
            if (user.user_id) {
                // 已登录
                loginFormDiv.style.display = 'none';
                userInfoDiv.style.display = 'flex';
                currentUsernameSpan.innerText = user.username;
                uploadSection.style.display = 'block';
                searchSection.style.display = 'block';
                // 管理员显示管理模块
                if (user.role === 'admin') {
                    adminSection.style.display = 'block';
                } else {
                    adminSection.style.display = 'none';
                }
            } else {
                // 未登录
                loginFormDiv.style.display = 'flex';
                userInfoDiv.style.display = 'none';
                uploadSection.style.display = 'none';
                searchSection.style.display = 'none';
                adminSection.style.display = 'none';
            }
        } catch (err) {
            loginFormDiv.style.display = 'flex';
            userInfoDiv.style.display = 'none';
            uploadSection.style.display = 'none';
            searchSection.style.display = 'none';
            adminSection.style.display = 'none';
        }
    }

    // 登录
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await apiCall('/api/login', { method: 'POST', body: { username, password } });
            alert('登录成功');
            checkLogin();
        } catch (err) {
            alert('登录失败：' + err.message);
        }
    });

    // 显示注册面板
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        registerPanel.style.display = 'block';
    });
    document.getElementById('cancelRegisterBtn').addEventListener('click', () => {
        registerPanel.style.display = 'none';
        regMsg.innerText = '';
    });
    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const email = document.getElementById('regEmail').value;
        try {
            await apiCall('/api/register', { method: 'POST', body: { username, password, email } });
            alert('注册成功，请登录');
            registerPanel.style.display = 'none';
        } catch (err) {
            regMsg.innerText = '注册失败：' + err.message;
        }
    });

    // 登出
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await apiCall('/api/logout', { method: 'POST' });
        alert('已退出登录');
        checkLogin();
    });

    // 上传图片
    const uploadForm = document.getElementById('uploadForm');
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(uploadForm);
        const uploadResultDiv = document.getElementById('uploadResult');
        uploadResultDiv.innerHTML = '<div class="loading">上传中，请稍后...</div>';
        try {
            const data = await apiCall('/api/upload', { method: 'POST', body: formData });
            uploadResultDiv.innerHTML = `<div style="color:green;">✅ ${data.message} (图片ID:${data.image_id})</div>`;
            uploadForm.reset();
            // 自动显示刚上传的识别结果
            showRecognition(data.image_id);
        } catch (err) {
            uploadResultDiv.innerHTML = `<div class="error">上传失败: ${err.message}</div>`;
        }
    });

    // 检索
    document.getElementById('searchBtn').addEventListener('click', async () => {
        const keyword = document.getElementById('searchKeyword').value.trim();
        const type = document.getElementById('searchType').value;
        if (!keyword) return alert('请输入关键词');
        const searchResultDiv = document.getElementById('searchResult');
        searchResultDiv.innerHTML = '<div class="loading">检索中...</div>';
        try {
            const data = await apiCall(`/api/search?keyword=${encodeURIComponent(keyword)}&type=${type}`);
            if (data.length === 0) {
                searchResultDiv.innerHTML = '<div>未找到匹配的琴谱。</div>';
                return;
            }
            let html = '';
            for (let img of data) {
                html += `
                    <div class="image-card" onclick="showRecognition(${img.image_id})">
                        <img src="/uploads/${img.image_path.split('\\').pop()}" alt="${img.title}" onerror="this.src='https://via.placeholder.com/220x150?text=No+Image'">
                        <div class="info">
                            <h4>${escapeHtml(img.title)}</h4>
                            <p>${img.dynasty || '未知'} · ${img.author || '佚名'}</p>
                            <p>上传: ${new Date(img.upload_time).toLocaleDateString()}</p>
                        </div>
                    </div>
                `;
            }
            searchResultDiv.innerHTML = html;
        } catch (err) {
            searchResultDiv.innerHTML = `<div class="error">检索失败: ${err.message}</div>`;
        }
    });

    // 展示识别结果卡片
    async function showRecognition(imageId) {
        const recogSection = document.getElementById('recogSection');
        const recogCardsDiv = document.getElementById('recogCards');
        recogSection.style.display = 'block';
        recogCardsDiv.innerHTML = '<div class="loading">加载识别结果...</div>';
        try {
            const data = await apiCall(`/api/recognition/${imageId}`);
            if (data.length === 0) {
                recogCardsDiv.innerHTML = '<div>暂无识别结果。</div>';
                return;
            }
            let cardsHtml = '';
            for (let item of data) {
                cardsHtml += `
                    <div class="char-card">
                        <div class="char-code">${escapeHtml(item.char_code)}</div>
                        <div class="finger">👆 左手: ${item.left_finger || '-'} &nbsp; ✌️ 右手: ${item.right_finger || '-'}</div>
                        <div class="confidence">📊 置信度: ${(item.confidence * 100).toFixed(1)}%</div>
                        <div class="position">📍 位置: (${item.position_x}, ${item.position_y})</div>
                        <div style="font-size:0.7rem; color:#aaa; margin-top:5px;">${escapeHtml(item.description || '')}</div>
                    </div>
                `;
            }
            recogCardsDiv.innerHTML = cardsHtml;
            recogSection.scrollIntoView({ behavior: 'smooth' });
        } catch (err) {
            recogCardsDiv.innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
        }
    }
    window.showRecognition = showRecognition;

    document.getElementById('closeRecogBtn').addEventListener('click', () => {
        document.getElementById('recogSection').style.display = 'none';
    });

    // 管理减字符：添加
    document.getElementById('addCharForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const char_code = document.getElementById('char_code').value.trim();
        const left_finger = document.getElementById('left_finger').value.trim();
        const left_position = document.getElementById('left_position').value.trim();
        const right_finger = document.getElementById('right_finger').value.trim();
        const string_num_val = document.getElementById('string_num').value.trim();
        const description = document.getElementById('description').value.trim();
        if (!char_code) {
            alert('字符代码不能为空');
            return;
        }
        const data = {
            char_code,
            left_finger,
            left_position,
            right_finger,
            string_num: string_num_val ? parseInt(string_num_val) : null,
            description
        };
        const resultDiv = document.getElementById('addCharResult');
        try {
            const result = await apiCall('/api/add_char', { method: 'POST', body: data });
            resultDiv.innerHTML = `<div style="color:green;">✅ 添加成功！</div>`;
            document.getElementById('addCharForm').reset();
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">添加失败: ${err.message}</div>`;
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 页面启动检查登录
    checkLogin();
</script>
</body>
</html>
